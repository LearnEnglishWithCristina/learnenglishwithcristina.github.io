<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Part 2! 🍜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg1: #E8F5E9;
    --bg2: #C8E6C9;
    --highlight: #2E7D32;
    --accent: #66BB6A;
    --correct: #43A047;
    --wrong: #E53935;
    --text: #2c2c2c;
    --card: #ffffff;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 10px 30px;
    overflow-x: hidden;
  }

  /* Floating food decorations */
  .floatie {
    position: fixed;
    font-size: 34px;
    opacity: 0.1;
    pointer-events: none;
    animation: floatUp linear infinite;
  }
  .floatie:nth-child(1) { left: 4%;  animation-duration: 13s; animation-delay: 0s; }
  .floatie:nth-child(2) { left: 18%; animation-duration: 19s; animation-delay: -6s; }
  .floatie:nth-child(3) { left: 50%; animation-duration: 11s; animation-delay: -4s; }
  .floatie:nth-child(4) { left: 75%; animation-duration: 17s; animation-delay: -9s; }
  .floatie:nth-child(5) { left: 88%; animation-duration: 15s; animation-delay: -2s; }
  @keyframes floatUp {
    from { transform: translateY(110vh); }
    to   { transform: translateY(-10vh); }
  }

  /* Screens */
  .screen { display: none; width: 100%; max-width: 700px; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }

  /* ── TITLE ── */
  .title-box {
    background: var(--card);
    border-radius: 32px;
    padding: 44px 56px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(46,125,50,0.18);
    margin-top: 60px;
    animation: bounceIn 0.6s ease;
  }
  @keyframes bounceIn {
    0%   { transform: scale(0.5); opacity: 0; }
    70%  { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
  .title-emoji { font-size: 86px; display: block; margin-bottom: 6px; }
  .title-text  { font-size: 52px; font-weight: 900; color: var(--highlight); text-shadow: 3px 3px 0 #a5d6a7; }
  .title-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 18px;
    font-weight: 900;
    border-radius: 50px;
    padding: 4px 18px;
    margin-top: 8px;
  }
  .subtitle { font-size: 19px; color: #aaa; margin-top: 6px; }

  .big-btn {
    margin-top: 28px;
    background: var(--highlight);
    color: #fff;
    border: none; border-radius: 50px;
    padding: 18px 52px;
    font-size: 28px;
    font-family: 'Nunito', sans-serif; font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 0 #1b5e20;
    transition: all 0.15s;
    animation: wiggle 2.5s ease-in-out infinite;
  }
  .big-btn:hover  { transform: translateY(-3px); box-shadow: 0 9px 0 #1b5e20; }
  .big-btn:active { transform: translateY(3px);  box-shadow: 0 3px 0 #1b5e20; }
  @keyframes wiggle {
    0%,88%,100% { transform: rotate(0deg); }
    91% { transform: rotate(-3deg); }
    95% { transform: rotate(3deg); }
  }

  /* ── TEACHER BAR ── */
  .teacher-bar {
    background: rgba(0,0,0,0.72);
    color: #fff; border-radius: 50px;
    padding: 8px 20px;
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 10px;
    font-size: 13px; flex-wrap: wrap; justify-content: center;
  }
  .teacher-bar span { opacity: 0.65; }
  .t-btn {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    color: #fff; border-radius: 20px;
    padding: 4px 14px;
    font-family: 'Nunito', sans-serif; font-size: 13px;
    cursor: pointer; transition: background 0.2s;
  }
  .t-btn:hover       { background: rgba(255,255,255,0.32); }
  .t-btn.active-mode { background: var(--highlight); border-color: var(--highlight); }

  /* ── STARS ── */
  .star-bar { display: flex; gap: 6px; font-size: 26px; margin-bottom: 6px; min-height: 34px; }

  /* ── PROGRESS DOTS ── */
  .progress-dots { display: flex; gap: 9px; margin: 4px 0 14px; flex-wrap: wrap; justify-content: center; }
  .dot {
    width: 13px; height: 13px; border-radius: 50%;
    background: rgba(0,0,0,0.15);
    transition: background 0.3s;
  }
  .dot.done    { background: var(--correct); }
  .dot.current { background: var(--highlight); transform: scale(1.35); }

  /* ── LEARN CARD ── */
  .learn-card {
    background: var(--card);
    border-radius: 30px;
    padding: 28px 30px 24px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    width: 100%; max-width: 500px;
    animation: slideIn 0.38s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(60px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  .food-emoji-big {
    font-size: 130px; display: block; cursor: pointer;
    line-height: 1.2;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.16));
    transition: transform 0.2s;
  }
  .food-emoji-big:hover  { transform: scale(1.12) rotate(-6deg); }
  .food-emoji-big:active { transform: scale(0.93); }

  .food-name {
    font-size: 50px; font-weight: 900; color: var(--text);
    margin: 8px 0 4px; letter-spacing: 2px;
  }
  .food-name span { color: var(--highlight); }

  .food-hint { font-size: 17px; color: #bbb; font-style: italic; margin-bottom: 12px; }
  .tap-me    { font-size: 14px; color: #ccc; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* Yummy/Yucky */
  .reaction-row {
    display: flex; justify-content: center; gap: 18px;
    margin: 14px 0 6px;
  }
  .react-btn {
    background: #f5f5f5; border: 3px solid #e0e0e0; border-radius: 18px;
    padding: 10px 22px; font-size: 22px;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    cursor: pointer; transition: all 0.18s; color: var(--text);
  }
  .react-btn:hover { transform: scale(1.1); }
  .react-btn.yummy:hover { border-color: var(--correct); background: #e8f5e9; }
  .react-btn.yucky:hover { border-color: var(--wrong);   background: #ffebee; }

  /* Nav */
  .nav-row { display: flex; gap: 14px; margin-top: 14px; justify-content: center; }
  .nav-btn {
    background: #fff; border: 3px solid #ddd; border-radius: 50px;
    padding: 11px 26px; font-size: 20px;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    cursor: pointer; transition: all 0.15s; color: var(--text);
  }
  .nav-btn:hover    { border-color: var(--highlight); color: var(--highlight); transform: scale(1.05); }
  .nav-btn.next-btn { background: var(--highlight); color: #fff; border-color: var(--highlight); }
  .nav-btn.next-btn:hover { color: #fff; }

  /* ── QUIZ ── */
  .quiz-card {
    background: var(--card);
    border-radius: 30px; padding: 24px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    width: 100%; max-width: 600px;
    animation: slideIn 0.38s ease;
  }
  .quiz-label { font-size: 20px; font-weight: 700; color: #888; margin-bottom: 4px; }
  .quiz-word  { font-size: 48px; font-weight: 900; color: var(--highlight); margin-bottom: 18px; }

  .choices-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media (max-width: 480px) {
    .choices-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .choice-btn {
    background: #fafafa; border: 4px solid #e8e8e8; border-radius: 20px;
    padding: 14px 6px; font-size: 50px;
    cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .choice-btn:hover   { transform: scale(1.1); border-color: var(--highlight); background: #f0fff0; }
  .choice-btn.correct { background: #e8f5e9; border-color: var(--correct); animation: correctBounce 0.5s ease; }
  .choice-btn.wrong   { background: #ffebee; border-color: var(--wrong);   animation: shake 0.4s ease; }

  @keyframes correctBounce {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.22); }
    70%  { transform: scale(0.96); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(5px); }
  }

  /* ── COMMANDS ── */
  .commands-intro {
    background: var(--card); border-radius: 24px;
    padding: 16px 24px; text-align: center;
    font-size: 20px; font-weight: 700; color: var(--highlight);
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    margin-bottom: 14px; width: 100%; max-width: 560px;
  }
  .command-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px; width: 100%; max-width: 560px;
  }
  .command-tile {
    background: var(--card); border-radius: 22px;
    padding: 22px 12px; text-align: center;
    box-shadow: 0 5px 18px rgba(0,0,0,0.09);
    cursor: pointer; transition: transform 0.2s, border 0.2s;
    border: 3px solid transparent;
  }
  .command-tile:hover       { transform: scale(1.05); border-color: var(--highlight); }
  .command-tile .tile-emoji { font-size: 50px; display: block; }
  .command-tile .tile-word  { font-size: 17px; font-weight: 900; color: var(--text); margin-top: 8px; }
  .command-tile .tile-sub   { font-size: 13px; color: #aaa; margin-top: 3px; }

  /* ── WIN ── */
  .win-box {
    background: var(--card); border-radius: 30px; padding: 44px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.18);
    max-width: 480px; animation: bounceIn 0.6s ease;
  }
  .win-emoji { font-size: 84px; display: block; }
  .win-title { font-size: 44px; font-weight: 900; color: var(--highlight); margin: 12px 0; }
  .win-stars { font-size: 38px; margin: 8px 0; }
  .win-sub   { font-size: 18px; color: #888; }

  /* ── FEEDBACK ── */
  .feedback {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 96px; pointer-events: none; z-index: 999;
    display: none; animation: feedbackPop 1s ease forwards;
  }
  @keyframes feedbackPop {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    50%  { transform: translate(-50%,-62%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%,-82%) scale(0.9); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Floating decorations -->
<div class="floatie">🐟</div>
<div class="floatie">🍓</div>
<div class="floatie">🎂</div>
<div class="floatie">🍜</div>
<div class="floatie">🥞</div>

<!-- ══════════════════ TITLE ══════════════════ -->
<div class="screen active" id="screen-title">
  <div class="title-box">
    <span class="title-emoji">🍜</span>
    <div class="title-text">MORE FOOD!</div>
    <div class="title-badge">Part 2</div>
    <div class="subtitle">New foods to learn 😋</div>
    <button class="big-btn" onclick="startLesson()">▶ START</button>
  </div>
</div>

<!-- ══════════════════ LEARN ══════════════════ -->
<div class="screen" id="screen-learn">
  <div class="teacher-bar">
    <span>Teacher:</span>
    <button class="t-btn active-mode" id="tl-learn"    onclick="setMode('learn')">📖 Learn</button>
    <button class="t-btn"             id="tl-quiz"     onclick="setMode('quiz')">❓ Quiz</button>
    <button class="t-btn"             id="tl-commands" onclick="setMode('commands')">👋 Commands</button>
  </div>
  <div class="star-bar"      id="star-bar-learn"></div>
  <div class="progress-dots" id="progress-dots"></div>

  <div class="learn-card" id="learn-card">
    <span class="food-emoji-big" id="learn-emoji" onclick="bounce()">🐟</span>
    <div class="food-name"       id="learn-name">FISH</div>
    <div class="food-hint"       id="learn-hint">🔊 "fish"</div>
    <div class="tap-me">👆 Tap the food!</div>
    <div class="reaction-row">
      <button class="react-btn yummy" onclick="react('😋')">😋 Yummy!</button>
      <button class="react-btn yucky" onclick="react('🤢')">🤢 Yucky!</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn"          onclick="prevFood()">⬅ Back</button>
      <button class="nav-btn next-btn" onclick="nextFood()">Next ➡</button>
    </div>
  </div>
</div>

<!-- ══════════════════ QUIZ ══════════════════ -->
<div class="screen" id="screen-quiz">
  <div class="teacher-bar">
    <span>Teacher:</span>
    <button class="t-btn"             id="tq-learn"    onclick="setMode('learn')">📖 Learn</button>
    <button class="t-btn active-mode" id="tq-quiz"     onclick="setMode('quiz')">❓ Quiz</button>
    <button class="t-btn"             id="tq-commands" onclick="setMode('commands')">👋 Commands</button>
  </div>
  <div class="star-bar" id="star-bar-quiz"></div>

  <div class="quiz-card">
    <div class="quiz-label" id="quiz-label">Find the...</div>
    <div class="quiz-word"  id="quiz-word">FISH</div>
    <div class="choices-grid" id="choices-grid"></div>
  </div>
</div>

<!-- ══════════════════ COMMANDS ══════════════════ -->
<div class="screen" id="screen-commands">
  <div class="teacher-bar">
    <span>Teacher:</span>
    <button class="t-btn"             id="tc-learn"    onclick="setMode('learn')">📖 Learn</button>
    <button class="t-btn"             id="tc-quiz"     onclick="setMode('quiz')">❓ Quiz</button>
    <button class="t-btn active-mode" id="tc-commands" onclick="setMode('commands')">👋 Commands</button>
  </div>
  <div class="commands-intro">👆 Tap a card to use it!</div>
  <div class="command-grid" id="command-grid"></div>
</div>

<!-- ══════════════════ WIN ══════════════════ -->
<div class="screen" id="screen-win">
  <div class="win-box">
    <span class="win-emoji">🎉</span>
    <div class="win-title">Amazing!</div>
    <div class="win-stars" id="win-stars">⭐⭐⭐</div>
    <div class="win-sub">You know so many foods now! 🍽️</div>
    <button class="big-btn" style="margin-top:22px" onclick="restartQuiz()">Play Again 🔄</button>
  </div>
</div>

<!-- Feedback overlay -->
<div class="feedback" id="feedback"></div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────
const foods = [
  { emoji: '🐟', name: 'FISH',        syllables: 'fish' },
  { emoji: '🍗', name: 'CHICKEN',     syllables: 'chick-en' },
  { emoji: '🍜', name: 'NOODLES',     syllables: 'noo-dles' },
  { emoji: '🍓', name: 'STRAWBERRY',  syllables: 'straw-ber-ry' },
  { emoji: 'BUTTERNUT_SVG', name: 'BUTTERNUT',   syllables: 'but-ter-nut' },
  { emoji: '🥔', name: 'POTATO',      syllables: 'po-ta-to' },
  { emoji: '🥞', name: 'PANCAKE',     syllables: 'pan-cake' },
  { emoji: '🎂', name: 'CAKE',        syllables: 'cake' },
];

const commands = [
  { emoji: '🤔', word: 'WHAT IS THIS?',   sub: 'Point at any food' },
  { emoji: '😋', word: 'YUMMY!',          sub: 'Rub your tummy!' },
  { emoji: '🤢', word: 'YUCKY!',          sub: 'Make a yucky face!' },
  { emoji: '❤️',  word: 'I LIKE IT',      sub: 'Hug yourself!' },
  { emoji: '✋', word: "I DON'T LIKE IT", sub: 'Push hands away!' },
  { emoji: '🌟', word: 'GREAT JOB!',      sub: 'Big thumbs up!' },
  { emoji: '🔁', word: 'AGAIN',           sub: 'Circle your finger!' },
  { emoji: '👁️',  word: 'LOOK',           sub: 'Point to your eyes!' },
];

// ─── STATE ────────────────────────────────────────────────────────────────
let current = 0;
let stars = 0;
let quizAnswered = false;

// ─── SCREENS ─────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function startLesson() {
  showScreen('learn');
  renderProgress();
  updateLearnCard();
  renderStars();
}

// ─── MODE ─────────────────────────────────────────────────────────────────
function setMode(m) {
  // Update tab highlights
  ['learn','quiz','commands'].forEach(mode => {
    ['tl','tq','tc'].forEach(prefix => {
      const el = document.getElementById(prefix + '-' + mode);
      if (el) el.className = 't-btn' + (mode === m ? ' active-mode' : '');
    });
  });

  if (m === 'learn') {
    showScreen('learn');
    renderProgress();
    updateLearnCard();
    renderStars();
  } else if (m === 'quiz') {
    showScreen('quiz');
    renderStars();
    newQuiz();
  } else if (m === 'commands') {
    showScreen('commands');
    renderCommands();
  }
}

// ─── LEARN ────────────────────────────────────────────────────────────────
function updateLearnCard() {
  const f = foods[current];
  const el = document.getElementById('learn-emoji');
  if (f.emoji === 'BUTTERNUT_SVG') {
    el.innerHTML = BUTTERNUT_SVG_IMG;
    el.style.fontSize = '0';
  } else {
    el.innerHTML = '';
    el.style.fontSize = '130px';
    el.textContent = f.emoji;
  }
  document.getElementById('learn-name').innerHTML =
    '<span>' + f.name[0] + '</span>' + f.name.slice(1).toLowerCase();
  document.getElementById('learn-hint').textContent = '🔊 "' + f.syllables + '"';
  renderProgress();
}

function nextFood() {
  if (current < foods.length - 1) {
    current++;
    animateCard('learn-card');
    updateLearnCard();
  } else {
    showFeedback('🌟');
  }
}

function prevFood() {
  if (current > 0) { current--; updateLearnCard(); }
}

function animateCard(id) {
  const c = document.getElementById(id);
  if (!c) return;
  c.style.animation = 'none';
  setTimeout(() => { c.style.animation = 'slideIn 0.38s ease'; }, 10);
}

function bounce() {
  const el = document.getElementById('learn-emoji');
  el.style.transform = 'scale(1.3) rotate(-8deg)';
  setTimeout(() => { el.style.transform = ''; }, 280);
  const f = foods[current];
  if (f.emoji !== 'BUTTERNUT_SVG') showFeedback(f.emoji);
}

function react(emoji) { showFeedback(emoji); }

// ─── PROGRESS ─────────────────────────────────────────────────────────────
function renderProgress() {
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  foods.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' +
      (i < current   ? ' done'    : '') +
      (i === current ? ' current' : '');
    dots.appendChild(d);
  });
}

// ─── STARS ────────────────────────────────────────────────────────────────
function addStar() {
  stars++;
  renderStars();
}
function renderStars() {
  ['star-bar-learn', 'star-bar-quiz'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    for (let i = 0; i < stars; i++) {
      const s = document.createElement('span');
      s.textContent = '⭐';
      el.appendChild(s);
    }
  });
}

// ─── QUIZ ─────────────────────────────────────────────────────────────────
function newQuiz() {
  quizAnswered = false;

  const correctIdx = Math.floor(Math.random() * foods.length);
  const correct = foods[correctIdx];

  const pool = foods.filter((_, i) => i !== correctIdx);
  shuffle(pool);

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';

  // Always "Find the..." — word shown, tap the right emoji
  document.getElementById('quiz-label').textContent = 'Find the...';
  document.getElementById('quiz-word').textContent  = correct.name;
  grid.style.gridTemplateColumns = 'repeat(4, 1fr)';

  const choices = [correct, ...pool.slice(0, 7)];
  shuffle(choices);
  choices.forEach(food => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.dataset.name = food.name;
    btn.innerHTML = `<span>${foodDisplay(food)}</span>`;
    btn.onclick = () => handleChoice(btn, food.name, correct.name);
    grid.appendChild(btn);
  });
}

function handleChoice(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;

  if (chosen === correct) {
    btn.classList.add('correct');
    showFeedback('⭐');
    addStar();
    setTimeout(newQuiz, 1300);
  } else {
    btn.classList.add('wrong');
    showFeedback('❌');
    // Highlight the correct button
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.dataset.name === correct) b.classList.add('correct');
    });
    setTimeout(newQuiz, 1600);
  }
}

// ─── COMMANDS ─────────────────────────────────────────────────────────────
function renderCommands() {
  const grid = document.getElementById('command-grid');
  grid.innerHTML = '';
  commands.forEach(cmd => {
    const tile = document.createElement('div');
    tile.className = 'command-tile';
    tile.innerHTML = `
      <span class="tile-emoji">${cmd.emoji}</span>
      <div class="tile-word">${cmd.word}</div>
      <div class="tile-sub">${cmd.sub}</div>
    `;
    tile.onclick = () => {
      showFeedback(cmd.emoji);
      tile.style.borderColor = 'var(--highlight)';
      setTimeout(() => { tile.style.borderColor = 'transparent'; }, 800);
    };
    grid.appendChild(tile);
  });
}

// ─── FEEDBACK ─────────────────────────────────────────────────────────────
function showFeedback(emoji) {
  const el = document.getElementById('feedback');
  el.textContent = emoji;
  el.style.display = 'block';
  el.style.animation = 'none';
  setTimeout(() => { el.style.animation = 'feedbackPop 1s ease forwards'; }, 10);
  setTimeout(() => { el.style.display = 'none'; }, 1050);
}

  <!-- stem -->

  <line x1="50" y1="65" x2="50" y2="124" stroke="#c87a10" stroke-width="1.5" opacity="0.5"/>

function foodDisplay(food) {
  if (food.emoji === 'BUTTERNUT_SVG') return BUTTERNUT_SVG_IMG;
  return food.emoji;
}

function foodDisplayLarge(food) {
  if (food.emoji === 'BUTTERNUT_SVG') {
    return `<span id="learn-emoji" onclick="bounce()" style="display:block;cursor:pointer;line-height:1.2;transition:transform 0.2s;font-size:130px;">${BUTTERNUT_SVG_IMG}</span>`;
  }
  return null;
}
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function restartQuiz() { stars = 0; current = 0; setMode('quiz'); }
