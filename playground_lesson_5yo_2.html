<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Playground! 🛝</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg1: #E8F5E9; --bg2: #C8E6C9;
    --highlight: #2E7D32; --correct: #43A047; --wrong: #E53935;
    --card: #ffffff; --text: #2c2c2c;
  }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 10px 10px 30px; overflow-x: hidden;
  }
  .floatie { position:fixed; font-size:32px; opacity:0.08; pointer-events:none; animation:floatUp linear infinite; }
  .floatie:nth-child(1){left:5%;  animation-duration:14s; animation-delay:0s;}
  .floatie:nth-child(2){left:25%; animation-duration:18s; animation-delay:-5s;}
  .floatie:nth-child(3){left:60%; animation-duration:12s; animation-delay:-8s;}
  .floatie:nth-child(4){left:82%; animation-duration:16s; animation-delay:-2s;}
  @keyframes floatUp{from{transform:translateY(0)}to{transform:translateY(-110vh)}}
  .screen { display:none; width:100%; max-width:720px; flex-direction:column; align-items:center; }
  .screen.active { display:flex; }

  /* TITLE */
  .title-box {
    background:var(--card); border-radius:32px; padding:40px 52px;
    text-align:center; box-shadow:0 10px 40px rgba(46,125,50,0.2);
    margin-top:55px; animation:bounceIn 0.6s ease;
  }
  @keyframes bounceIn{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
  .title-emoji { font-size:84px; display:block; margin-bottom:6px; }
  .title-text  { font-family:'Fredoka One',sans-serif; font-size:50px; color:var(--highlight); text-shadow:3px 3px 0 #C8E6C9; }
  .subtitle    { font-size:19px; color:#aaa; margin-top:8px; }
  .big-btn {
    margin-top:28px; background:var(--highlight); color:#fff;
    border:none; border-radius:50px; padding:18px 52px;
    font-size:28px; font-family:'Fredoka One',sans-serif;
    cursor:pointer; box-shadow:0 6px 0 #1B5E20; transition:all 0.15s;
    animation:wiggle 2.5s ease-in-out infinite;
  }
  .big-btn:hover  { transform:translateY(-3px); box-shadow:0 9px 0 #1B5E20; }
  .big-btn:active { transform:translateY(3px);  box-shadow:0 3px 0 #1B5E20; }
  @keyframes wiggle{0%,88%,100%{transform:rotate(0deg)}91%{transform:rotate(-3deg)}95%{transform:rotate(3deg)}}

  /* TEACHER BAR */
  .teacher-bar {
    background:rgba(0,0,0,0.72); color:#fff; border-radius:50px;
    padding:8px 20px; display:flex; gap:10px; align-items:center;
    margin-bottom:10px; font-size:13px; flex-wrap:wrap; justify-content:center;
  }
  .teacher-bar span { opacity:0.65; }
  .t-btn {
    background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.35);
    color:#fff; border-radius:20px; padding:4px 14px;
    font-family:'Nunito',sans-serif; font-size:13px; cursor:pointer;
  }
  .t-btn:hover { background:rgba(255,255,255,0.32); }
  .t-btn.active-mode { background:var(--highlight); border-color:var(--highlight); }
  .star-bar { display:flex; gap:6px; font-size:26px; margin-bottom:6px; min-height:34px; }
  .progress-dots { display:flex; gap:9px; margin:4px 0 14px; flex-wrap:wrap; justify-content:center; }
  .dot { width:13px; height:13px; border-radius:50%; background:rgba(0,0,0,0.15); transition:background 0.3s; }
  .dot.done    { background:var(--correct); }
  .dot.current { background:var(--highlight); transform:scale(1.35); }

  /* LEARN CARD */
  .learn-card {
    background:var(--card); border-radius:30px; padding:24px 30px;
    text-align:center; box-shadow:0 8px 30px rgba(0,0,0,0.12);
    width:100%; max-width:500px; animation:slideIn 0.38s ease;
  }
  @keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
  .learn-img {
    width:220px; height:180px; object-fit:contain; cursor:pointer;
    transition:transform 0.2s; display:block; margin:0 auto 10px;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.15));
  }
  .learn-img:hover  { transform:scale(1.1) rotate(-4deg); }
  .learn-img:active { transform:scale(0.93); }
  .item-name { font-family:'Fredoka One',sans-serif; font-size:48px; color:var(--highlight); margin:6px 0 4px; }
  .item-hint { font-size:16px; color:#bbb; font-style:italic; margin-bottom:14px; }
  .tap-me    { font-size:14px; color:#ccc; animation:blink 2s infinite; }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}
  .nav-row { display:flex; gap:14px; margin-top:14px; justify-content:center; }
  .nav-btn {
    background:#fff; border:3px solid #ddd; border-radius:50px;
    padding:11px 26px; font-size:20px; font-family:'Nunito',sans-serif; font-weight:700;
    cursor:pointer; transition:all 0.15s; color:var(--text);
  }
  .nav-btn:hover    { border-color:var(--highlight); color:var(--highlight); transform:scale(1.05); }
  .nav-btn.next-btn { background:var(--highlight); color:#fff; border-color:var(--highlight); }
  .nav-btn.next-btn:hover { color:#fff; }

  /* QUIZ */
  .quiz-card {
    background:var(--card); border-radius:30px; padding:24px;
    text-align:center; box-shadow:0 8px 30px rgba(0,0,0,0.12);
    width:100%; max-width:600px;
  }
  .quiz-label { font-size:20px; font-weight:700; color:#888; margin-bottom:4px; }
  .quiz-word  { font-family:'Fredoka One',sans-serif; font-size:44px; color:var(--highlight); margin-bottom:18px; }
  .choices-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  @media(max-width:480px){ .choices-grid{ grid-template-columns:repeat(2,1fr); } }
  .choice-btn {
    background:#fafafa; border:4px solid #e8e8e8; border-radius:20px;
    padding:10px 6px; cursor:pointer; transition:all 0.2s;
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .choice-btn img { width:70px; height:60px; object-fit:contain; }
  .choice-btn:hover   { transform:scale(1.08); border-color:var(--highlight); background:#E8F5E9; }
  .choice-btn.correct { background:#e8f5e9; border-color:var(--correct); animation:correctBounce 0.5s ease; }
  .choice-btn.wrong   { background:#ffebee; border-color:var(--wrong);   animation:shake 0.4s ease; }

  /* FIND IT */
  .find-header {
    background:var(--card); border-radius:24px; padding:14px 22px;
    text-align:center; width:100%; max-width:680px; margin-bottom:12px;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
  }
  .find-question { font-family:'Fredoka One',sans-serif; font-size:26px; color:var(--highlight); }
  .find-question span { color:var(--wrong); }
  .find-hint { font-size:14px; color:#aaa; margin-top:4px; }

  .playground-wrap {
    width:100%; max-width:680px; position:relative;
    border-radius:20px; overflow:hidden;
    box-shadow:0 8px 28px rgba(0,0,0,0.16);
  }
  .playground-wrap img.bg-img { width:100%; height:auto; display:block; }

  /* Hotspots */
  .hotspot {
    position:absolute; border-radius:12px;
    cursor:pointer; border:none;
    transition:all 0.2s; background:transparent;
  }
  .hotspot:hover { background:rgba(255,255,100,0.2); }
  .hotspot.correct-hs { background:rgba(67,160,71,0.4); border-color:var(--correct); animation:correctBounce 0.5s ease; }
  .hotspot.wrong-hs   { background:rgba(229,57,53,0.3); border-color:var(--wrong);   animation:shake 0.4s ease; }

  .hs-label {
    position:absolute; background:var(--highlight); color:#fff;
    font-family:'Fredoka One',sans-serif; font-size:13px;
    border-radius:20px; padding:4px 12px; pointer-events:none;
    white-space:nowrap; display:none; z-index:10;
    box-shadow:0 3px 8px rgba(0,0,0,0.2);
  }
  .hs-label.show { display:block; }

  .find-result {
    font-family:'Fredoka One',sans-serif; font-size:20px;
    text-align:center; margin-top:10px; min-height:28px;
  }
  .find-result.correct-msg { color:var(--correct); }
  .find-result.wrong-msg   { color:var(--wrong); }
  .find-progress { font-size:13px; color:#888; font-weight:700; text-align:center; margin-top:6px; }

  /* WIN */
  .win-box {
    background:var(--card); border-radius:30px; padding:44px; text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.18); max-width:460px; animation:bounceIn 0.6s ease;
  }
  .win-emoji { font-size:80px; display:block; }
  .win-title { font-family:'Fredoka One',sans-serif; font-size:44px; color:var(--highlight); margin:12px 0; }
  .win-stars { font-size:38px; margin:8px 0; }
  .win-sub   { font-size:17px; color:#888; }

  .feedback {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:96px; pointer-events:none; z-index:999; display:none;
    animation:feedbackPop 1s ease forwards;
  }
  @keyframes feedbackPop{0%{transform:translate(-50%,-50%) scale(0);opacity:1}50%{transform:translate(-50%,-62%) scale(1.2);opacity:1}100%{transform:translate(-50%,-82%) scale(0.9);opacity:0}}
  @keyframes correctBounce{0%{transform:scale(1)}40%{transform:scale(1.22)}70%{transform:scale(0.96)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-8px)}80%{transform:translateX(5px)}}
</style>
</head>
<body>

<div class="floatie">🛝</div>
<div class="floatie">🌳</div>
<div class="floatie">⭐</div>
<div class="floatie">🌤️</div>
<div class="feedback" id="feedback"></div>

<button id="sound-toggle" onclick="toggleSound()"
  style="position:fixed;top:14px;left:18px;z-index:999;background:rgba(255,255,255,0.85);
  border:2px solid #ccc;border-radius:50%;width:48px;height:48px;font-size:24px;
  cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,0.15);">🔊</button>

<!-- TITLE -->
<div class="screen active" id="screen-title">
  <div class="title-box">
    <span class="title-emoji">🛝</span>
    <div class="title-text">THE PLAYGROUND!</div>
    <div class="subtitle">Let's play outside! 🌤️</div>
    <button class="big-btn" onclick="startLesson()">▶ START</button>
  </div>
</div>

<!-- LEARN -->
<div class="screen" id="screen-learn">
  <div class="teacher-bar">
    <span>Teacher:</span>
    <button class="t-btn active-mode" id="tl-learn" onclick="setMode('learn')">📖 Learn</button>
    <button class="t-btn"             id="tl-quiz"  onclick="setMode('quiz')">❓ Quiz</button>
    <button class="t-btn"             id="tl-find"  onclick="setMode('find')">🔍 Find it!</button>
  </div>
  <div class="star-bar"      id="star-bar-learn"></div>
  <div class="progress-dots" id="progress-dots"></div>
  <div class="learn-card" id="learn-card">
    <img class="learn-img" id="learn-img" src="" alt="" onclick="bounce()"/>
    <div class="item-name" id="learn-name">SLIDE</div>
    <div class="item-hint" id="learn-hint">🔊 "slide"</div>
    <div class="tap-me">👆 Tap the picture!</div>
    <div class="nav-row">
      <button class="nav-btn"          onclick="prevItem()">⬅ Back</button>
      <button class="nav-btn next-btn" onclick="nextItem()">Next ➡</button>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="screen-quiz">
  <div class="teacher-bar">
    <span>Teacher:</span>
    <button class="t-btn"             id="tq-learn" onclick="setMode('learn')">📖 Learn</button>
    <button class="t-btn active-mode" id="tq-quiz"  onclick="setMode('quiz')">❓ Quiz</button>
    <button class="t-btn"             id="tq-find"  onclick="setMode('find')">🔍 Find it!</button>
  </div>
  <div class="star-bar" id="star-bar-quiz"></div>
  <div class="quiz-card">
    <div class="quiz-label">Find the...</div>
    <div class="quiz-word" id="quiz-word">SLIDE</div>
    <div class="choices-grid" id="choices-grid"></div>
  </div>
</div>

<!-- FIND IT -->
<div class="screen" id="screen-find">
  <div class="teacher-bar">
    <span>Teacher:</span>
    <button class="t-btn"             id="tf-learn" onclick="setMode('learn')">📖 Learn</button>
    <button class="t-btn"             id="tf-quiz"  onclick="setMode('quiz')">❓ Quiz</button>
    <button class="t-btn active-mode" id="tf-find"  onclick="setMode('find')">🔍 Find it!</button>
  </div>
  <div class="star-bar" id="star-bar-find"></div>
  <div class="find-header">
    <div class="find-question">Circle the <span id="find-target">SLIDE</span>!</div>
    <div class="find-hint">👆 Circle it with your finger!</div>
  </div>
  <div class="playground-wrap" id="playground-wrap">
    <img class="bg-img" id="bg-img" src="" alt="playground"/>
            <!-- ═══ HOTSPOTS ═══ -->

    <!-- SLIDE 1: red slide left of jungle gym -->
    <div class="hotspot" id="hs-SLIDE"   style="left:34%; top:43%; width:8%;  height:28%;"></div>
    <!-- SLIDE 2: yellow slide right of jungle gym -->
    <div class="hotspot" id="hs-SLIDE-2" style="left:78%; top:46%; width:10%; height:25%;"></div>

    <!-- SWING: left structure -->
    <div class="hotspot" id="hs-SWING"   style="left:3%;  top:21%; width:13%; height:49%;"></div>

    <!-- TREE LEFT: big tree far left -->
    <div class="hotspot" id="hs-TREES"   style="left:0%;  top:5%;  width:10%; height:43%;"></div>
    <!-- TREE RIGHT: big tree far right -->
    <div class="hotspot" id="hs-TREES-2" style="left:89%; top:5%;  width:11%; height:41%;"></div>

    <!-- BENCH: lady sitting -->
    <div class="hotspot" id="hs-BENCH"   style="left:24%; top:45%; width:10%; height:18%;"></div>

    <!-- SANDBOX: round pit -->
    <div class="hotspot" id="hs-SANDBOX" style="left:47%; top:66%; width:10%; height:21%;"></div>

    <!-- SAND TOYS: bucket boy holding -->
    <div class="hotspot" id="hs-SANDTOYS_1" data-name="SAND TOYS"   style="left:47%; top:59%; width:5%;  height:16%;"></div>
    <!-- SAND TOYS: truck bottom centre -->
    <div class="hotspot" id="hs-SANDTOYS_2" data-name="SAND TOYS" style="left:38%; top:86%; width:8%;  height:9%;"></div>
    <!-- SAND TOYS: ball left of sandbox -->
    <div class="hotspot" id="hs-SANDTOYS_3" data-name="SAND TOYS" style="left:38%; top:64%; width:6%;  height:11%;"></div>

    <!-- SEESAW: child on left end -->
    <div class="hotspot" id="hs-SEESAW"   style="left:7%;  top:66%; width:7%;  height:21%;"></div>
    <!-- SEESAW: child on right end -->
    <div class="hotspot" id="hs-SEESAW-2" style="left:26%; top:66%; width:8%;  height:14%;"></div>

    <!-- FRIEND: girl yellow shirt on jungle gym -->
    <div class="hotspot" id="hs-FRIEND"   style="left:71%; top:32%; width:7%;  height:23%;"></div>
    <!-- FRIEND: boy red shirt by sandbox -->
    <div class="hotspot" id="hs-FRIEND-2" style="left:47%; top:55%; width:7%;  height:22%;"></div>

    <!-- Labels -->
    <div class="hs-label" id="lbl-SLIDE"      style="left:34%;  top:39%;">🛝 SLIDE</div>
    <div class="hs-label" id="lbl-SWING"      style="left:3%;   top:17%;">SWING</div>
    <div class="hs-label" id="lbl-TREES"      style="left:0%;   top:2%;">🌳 TREES</div>
    <div class="hs-label" id="lbl-BENCH"      style="left:24%;  top:41%;">🪑 BENCH</div>
    <div class="hs-label" id="lbl-SANDBOX"    style="left:47%;  top:62%;">SANDBOX</div>
    <div class="hs-label" id="lbl-SAND TOYS"  style="left:38%;  top:55%;">SAND TOYS</div>
    <div class="hs-label" id="lbl-SEESAW"     style="left:7%;   top:62%;">SEESAW</div>
    <div class="hs-label" id="lbl-FRIEND"     style="left:71%;  top:28%;">FRIEND</div>
    </div>
  <div style="display:flex; gap:12px; justify-content:center; margin-top:12px; flex-wrap:wrap;">
    <button onclick="foundIt()" style="background:#43A047;color:#fff;border:none;border-radius:50px;
      padding:12px 28px;font-family:'Fredoka One',sans-serif;font-size:20px;cursor:pointer;
      box-shadow:0 5px 0 #1B5E20;">✅ I found it!</button>
    <button onclick="skipIt()" style="background:#bbb;color:#fff;border:none;border-radius:50px;
      padding:12px 28px;font-family:'Fredoka One',sans-serif;font-size:20px;cursor:pointer;
      box-shadow:0 5px 0 #999;">⏭️ Next</button>
  </div>
  <div class="find-progress" id="find-progress">1 / 8</div>
</div>

<!-- WIN -->
<div class="screen" id="screen-win">
  <div class="win-box">
    <span class="win-emoji">🎉</span>
    <div class="win-title">Amazing!</div>
    <div class="win-stars" id="win-stars">⭐⭐⭐</div>
    <div class="win-sub">You know the playground! 🛝</div>
    <button class="big-btn" style="animation:none" onclick="restartQuiz()">Play Again 🔄</button>
  </div>
</div>

const items = [
  { key:'slide',    name:'SLIDE',     sound:'slide' },
  { key:'swing',    name:'SWING',     sound:'swing' },
  { key:'tree',     name:'TREES',      sound:'trees' },
  { key:'bench',    name:'BENCH',     sound:'bench' },
  { key:'sandbox',  name:'SANDBOX',   sound:'sandbox' },
  { key:'sandtoys', name:'SAND TOYS', sound:'sand toys' },
  { key:'seesaw',   name:'SEESAW',    sound:'seesaw' },
  { key:'friends',  name:'FRIEND',   sound:'friend' },
];

let current=0, stars=0, quizAnswered=false, findQueue=[], findIdx=0, findAnswered=false;
let ttsReady=false, soundOn=true, ttsVoice=null;

function unlockTTS(){
  if(ttsReady)return; ttsReady=true;
  const u=new SpeechSynthesisUtterance(' '); u.volume=0;
  window.speechSynthesis.speak(u); pickVoice();
}
function pickVoice(){
  const v=window.speechSynthesis.getVoices();
  ttsVoice=v.find(x=>x.lang==='en-US'&&x.localService)||v.find(x=>x.lang==='en-US')||
           v.find(x=>x.lang.startsWith('en-'))||v.find(x=>x.lang.startsWith('en'))||v[0]||null;
}
if(window.speechSynthesis){ window.speechSynthesis.onvoiceschanged=pickVoice; pickVoice(); }
function speak(text,rate=0.6){
  if(!soundOn||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=rate; u.pitch=1.05; u.volume=1;
  if(ttsVoice)u.voice=ttsVoice;
  window.speechSynthesis.speak(u);
}
function toggleSound(){ soundOn=!soundOn; document.getElementById('sound-toggle').textContent=soundOn?'🔊':'🔇'; }
document.addEventListener('touchstart',unlockTTS,{once:true});
document.addEventListener('mousedown', unlockTTS,{once:true});

// Set background image
document.getElementById('bg-img').src = IMGS.background;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
function startLesson(){ showScreen('learn'); renderProgress(); updateLearnCard(); renderStars(); }
function setMode(m){
  ['learn','quiz','find'].forEach(mode=>{
    ['tl','tq','tf'].forEach(prefix=>{
      const el=document.getElementById(prefix+'-'+mode);
      if(el) el.className='t-btn'+(mode===m?' active-mode':'');
    });
  });
  if(m==='learn') { showScreen('learn'); renderProgress(); updateLearnCard(); renderStars(); }
  if(m==='quiz')  { showScreen('quiz');  renderStars(); newQuiz(); }
  if(m==='find')  { showScreen('find');  renderStars(); initFind(); }
}

// LEARN
function updateLearnCard(){
  const it=items[current];
  document.getElementById('learn-img').src=IMGS[it.key];
  document.getElementById('learn-img').alt=it.name;
  document.getElementById('learn-name').textContent=it.name;
  document.getElementById('learn-hint').textContent='🔊 "'+it.sound+'"';
  renderProgress();
  speak(it.name, 0.6);
}
function nextItem(){ if(current<items.length-1){ current++; animateCard(); updateLearnCard(); } else showFeedback('🌟'); }
function prevItem(){ if(current>0){ current--; updateLearnCard(); } }
function animateCard(){
  const c=document.getElementById('learn-card'); c.style.animation='none';
  setTimeout(()=>{ c.style.animation='slideIn 0.38s ease'; },10);
}
function bounce(){
  const el=document.getElementById('learn-img');
  el.style.transform='scale(1.2) rotate(-5deg)';
  setTimeout(()=>{ el.style.transform=''; },280);
  speak(items[current].name, 0.6); showFeedback('⭐');
}
function renderProgress(){
  const dots=document.getElementById('progress-dots'); dots.innerHTML='';
  items.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i<current?' done':'')+(i===current?' current':'');
    dots.appendChild(d);
  });
}

// STARS
function addStar(){ stars++; renderStars(); }
function renderStars(){
  ['star-bar-learn','star-bar-quiz','star-bar-find'].forEach(id=>{
    const el=document.getElementById(id); if(!el)return; el.innerHTML='';
    for(let i=0;i<stars;i++){ const s=document.createElement('span'); s.textContent='⭐'; el.appendChild(s); }
  });
}

// QUIZ
function newQuiz(){
  quizAnswered=false;
  const correctIdx=Math.floor(Math.random()*items.length);
  const correct=items[correctIdx];
  document.getElementById('quiz-word').textContent=correct.name;
  speak(correct.name, 0.6);
  const others=[...items.filter((_,i)=>i!==correctIdx)];
  const choices=[correct,...shuffle(others)];
  for(let i=choices.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [choices[i],choices[j]]=[choices[j],choices[i]]; }
  const grid=document.getElementById('choices-grid'); grid.innerHTML='';
  choices.forEach(it=>{
    const btn=document.createElement('button'); btn.className='choice-btn'; btn.dataset.name=it.name;
    btn.innerHTML='<img src="'+IMGS[it.key]+'" alt="'+it.name+'">';
    btn.onclick=()=>handleQuiz(btn,it.name,correct.name); grid.appendChild(btn);
  });
}
function handleQuiz(btn,chosen,correct){
  if(quizAnswered)return; quizAnswered=true;
  if(chosen===correct){
    btn.classList.add('correct'); showFeedback('⭐'); addStar();
    speak(correct+'! Great job!', 0.6); setTimeout(newQuiz,1400);
  } else {
    btn.classList.add('wrong'); showFeedback('❌'); speak('Try again!', 0.6);
    document.querySelectorAll('.choice-btn').forEach(b=>{ if(b.dataset.name===correct) b.classList.add('correct'); });
    setTimeout(newQuiz,1700);
  }
}

// FIND IT
function initFind(){
  findQueue=shuffle([...items]); findIdx=0; findAnswered=false;
  // No hotspot clicking needed - student circles with finger
  document.getElementById('find-progress').textContent = '1 / ' + findQueue.length;
  renderFindRound();
}
function renderFindRound(){
  findAnswered=false;
  const target=findQueue[findIdx];
  document.getElementById('find-target').textContent=target.name;
  document.getElementById('find-result').textContent='';
  document.getElementById('find-result').className='find-result';
  document.getElementById('find-progress').textContent=(findIdx+1)+' / '+findQueue.length;
  items.forEach(it=>{
    const hs=document.getElementById('hs-'+it.name);
    if(hs){ hs.classList.remove('correct-hs','wrong-hs'); hs.style.pointerEvents='auto'; }
    const lbl=document.getElementById('lbl-'+it.name);
    if(lbl) lbl.classList.remove('show');
  });
  document.getElementById('find-target').textContent = target.name;
  speak('Circle the ' + target.sound + '!', 0.58);
}
function handleFindClick(name){
  if(findAnswered)return;
  const target=findQueue[findIdx];
  const hs=document.getElementById('hs-'+name);
  const lbl=document.getElementById('lbl-'+name);
  const result=document.getElementById('find-result');
  if(name===target.name){
    findAnswered=true;
    if(hs){ hs.classList.add('correct-hs'); hs.style.pointerEvents='none'; }
    const hs2c=document.getElementById('hs-'+name+'-2');
    if(hs2c){ hs2c.classList.add('correct-hs'); hs2c.style.pointerEvents='none'; }
    if(lbl) lbl.classList.add('show');
    result.textContent = '✅ Yes! ' + target.sound + '!';
    result.className='find-result correct-msg';
    showFeedback('⭐'); addStar();
    speak('Yes! ' + target.sound + '! Well done!', 0.6);
    document.querySelectorAll('.hotspot').forEach(h => h.style.pointerEvents='none');
    setTimeout(()=>{
      findIdx++;
      if(findIdx>=findQueue.length){
        showFeedback('🎉'); speak('Amazing! You found everything!', 0.6);
        setTimeout(()=>{ showScreen('win'); document.getElementById('win-stars').textContent='⭐'.repeat(Math.min(5,stars)); },1000);
      } else { renderFindRound(); }
    },1600);
  } else {
    if(hs){ hs.classList.add('wrong-hs'); }
    if(lbl) lbl.classList.add('show');
    result.textContent = '❌ Try again!';
    result.className = 'find-result wrong-msg';
    showFeedback('❌');
    speak('Try again!', 0.6);
    setTimeout(()=>{
      document.querySelectorAll('.hotspot').forEach(h=>h.classList.remove('wrong-hs'));
      if(lbl) lbl.classList.remove('show');
      result.textContent=''; result.className='find-result';
    },1800);
  }
}

function foundIt(){
  const target=findQueue[findIdx];
  showFeedback('⭐'); addStar();
  speak('Yes! ' + target.sound + '! Well done!', 0.6);
  setTimeout(()=>{
    findIdx++;
    if(findIdx>=findQueue.length){
      showFeedback('🎉'); speak('Amazing! You found everything!', 0.6);
      setTimeout(()=>{ showScreen('win'); document.getElementById('win-stars').textContent='⭐'.repeat(Math.min(5,stars)); },1000);
    } else { renderFindRound(); }
  }, 1200);
}
function skipIt(){
  findIdx++;
  if(findIdx>=findQueue.length){
    showFeedback('🎉');
    setTimeout(()=>{ showScreen('win'); document.getElementById('win-stars').textContent='⭐'.repeat(Math.min(5,stars)); },600);
  } else { renderFindRound(); }
}
function restartQuiz(){ stars=0; current=0; setMode('quiz'); }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function showFeedback(emoji){
  const el=document.getElementById('feedback'); el.textContent=emoji; el.style.display='block'; el.style.animation='none';
  setTimeout(()=>{ el.style.animation='feedbackPop 1s ease forwards'; },10);
  setTimeout(()=>{ el.style.display='none'; },1050);
}
</script>
