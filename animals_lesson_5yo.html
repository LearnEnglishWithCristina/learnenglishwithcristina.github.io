<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animals! 🐾</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #87CEEB;
    --grass: #7EC850;
    --sun: #FFD700;
    --card-bg: #fff;
    --highlight: #FF6B35;
    --correct: #4CAF50;
    --wrong: #f44336;
    --text: #2c2c2c;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(180deg, var(--sky) 0%, #c8eaff 40%, var(--grass) 40%, #5aab3a 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    overflow-x: hidden;
  }

  /* Sun decoration */
  body::before {
    content: '☀️';
    position: fixed;
    top: 10px;
    right: 30px;
    font-size: 60px;
    animation: sunPulse 3s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes sunPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  /* Clouds */
  .cloud {
    position: fixed;
    font-size: 50px;
    opacity: 0.85;
    pointer-events: none;
    animation: floatCloud linear infinite;
  }
  .cloud:nth-child(1) { top: 30px; animation-duration: 20s; animation-delay: 0s; }
  .cloud:nth-child(2) { top: 70px; animation-duration: 28s; animation-delay: -10s; font-size: 35px; }

  @keyframes floatCloud {
    from { left: -150px; }
    to { left: 110%; }
  }

  /* Screens */
  .screen { display: none; width: 100%; max-width: 700px; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }

  /* Title screen */
  .title-box {
    background: #fff;
    border-radius: 30px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    margin-top: 60px;
    animation: bounceIn 0.6s ease;
  }

  @keyframes bounceIn {
    0% { transform: scale(0.5); opacity: 0; }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  .title-emoji { font-size: 80px; display: block; margin-bottom: 10px; }
  .title-text { font-size: 52px; font-weight: 900; color: var(--highlight); text-shadow: 3px 3px 0 #ffd0c0; }
  .subtitle { font-size: 22px; color: #888; margin-top: 8px; }

  .big-btn {
    margin-top: 30px;
    background: var(--highlight);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 18px 50px;
    font-size: 28px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 6px 0 #c04a1a;
    transition: all 0.15s;
    animation: wiggle 2s ease-in-out infinite;
  }
  .big-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #c04a1a; }
  .big-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #c04a1a; }

  @keyframes wiggle {
    0%, 90%, 100% { transform: rotate(0deg); }
    92% { transform: rotate(-3deg); }
    96% { transform: rotate(3deg); }
  }

  /* Teacher controls bar */
  .teacher-bar {
    background: rgba(0,0,0,0.7);
    color: #fff;
    border-radius: 50px;
    padding: 8px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 10px;
    font-size: 13px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .teacher-bar span { opacity: 0.7; }
  .t-btn {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    border-radius: 20px;
    padding: 4px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }
  .t-btn:hover { background: rgba(255,255,255,0.35); }
  .t-btn.active-mode { background: var(--highlight); border-color: var(--highlight); }

  /* Progress dots */
  .progress-dots {
    display: flex;
    gap: 8px;
    margin: 5px 0 15px;
  }
  .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transition: background 0.3s;
  }
  .dot.done { background: var(--correct); }
  .dot.current { background: var(--highlight); transform: scale(1.3); }

  /* Animal card - LEARN MODE */
  .animal-card {
    background: #fff;
    border-radius: 30px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 500px;
    animation: slideIn 0.4s ease;
  }

  @keyframes slideIn {
    from { transform: translateX(60px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .animal-emoji-big {
    font-size: 130px;
    display: block;
    cursor: pointer;
    transition: transform 0.2s;
    line-height: 1.2;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
  }
  .animal-emoji-big:hover { transform: scale(1.1) rotate(-5deg); }
  .animal-emoji-big:active { transform: scale(0.95); }

  .animal-name {
    font-size: 54px;
    font-weight: 900;
    color: var(--text);
    margin: 10px 0 5px;
    letter-spacing: 2px;
  }
  .animal-name span { color: var(--highlight); }

  .sound-hint {
    font-size: 18px;
    color: #aaa;
    font-style: italic;
    margin-bottom: 15px;
  }

  .tap-me {
    font-size: 15px;
    color: #bbb;
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Nav buttons */
  .nav-row {
    display: flex;
    gap: 15px;
    margin-top: 20px;
    justify-content: center;
  }
  .nav-btn {
    background: #fff;
    border: 3px solid #ddd;
    border-radius: 50px;
    padding: 12px 28px;
    font-size: 22px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
  }
  .nav-btn:hover { border-color: var(--highlight); color: var(--highlight); transform: scale(1.05); }
  .nav-btn.next-btn { background: var(--highlight); color: #fff; border-color: var(--highlight); }

  /* QUIZ MODE */
  .quiz-question {
    background: #fff;
    border-radius: 30px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 560px;
    animation: slideIn 0.4s ease;
  }

  .quiz-label {
    font-size: 22px;
    font-weight: 700;
    color: #555;
    margin-bottom: 5px;
  }
  .quiz-word {
    font-size: 52px;
    font-weight: 900;
    color: var(--highlight);
    margin-bottom: 20px;
  }

  .choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }

  .choice-btn {
    background: #f8f8f8;
    border: 4px solid #e0e0e0;
    border-radius: 20px;
    padding: 15px 10px;
    font-size: 65px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    filter: drop-shadow(0 3px 5px rgba(0,0,0,0.1));
  }
  .choice-btn:hover { transform: scale(1.08); border-color: var(--highlight); background: #fff8f5; }
  .choice-btn.correct { background: #e8f5e9; border-color: var(--correct); animation: correctBounce 0.5s ease; }
  .choice-btn.wrong { background: #ffebee; border-color: var(--wrong); animation: shake 0.4s ease; }

  @keyframes correctBounce {
    0% { transform: scale(1); }
    40% { transform: scale(1.2); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-10px); }
    80% { transform: translateX(5px); }
  }

  /* Feedback overlay */
  .feedback {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 100px;
    pointer-events: none;
    z-index: 999;
    animation: feedbackPop 1s ease forwards;
  }
  @keyframes feedbackPop {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    50% { transform: translate(-50%,-60%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%,-80%) scale(1); opacity: 0; }
  }

  /* Stars / confetti panel */
  .star-bar {
    display: flex;
    gap: 8px;
    font-size: 28px;
    margin-bottom: 10px;
  }

  /* WIN screen */
  .win-box {
    background: #fff;
    border-radius: 30px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    max-width: 500px;
    animation: bounceIn 0.6s ease;
  }
  .win-emoji { font-size: 80px; display: block; }
  .win-title { font-size: 42px; font-weight: 900; color: var(--highlight); margin: 10px 0; }
  .win-stars { font-size: 40px; margin: 10px 0; }
  .win-sub { font-size: 18px; color: #777; }

  /* COMMANDS mode */
  .command-card {
    background: #fff;
    border-radius: 30px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    width: 100%;
    max-width: 500px;
    animation: slideIn 0.4s ease;
  }
  .command-emoji { font-size: 90px; display: block; margin-bottom: 10px; }
  .command-word { font-size: 48px; font-weight: 900; color: var(--highlight); }
  .command-sub { font-size: 20px; color: #aaa; margin-top: 5px; }

  .command-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    width: 100%;
    max-width: 520px;
    margin-top: 15px;
  }
  .command-tile {
    background: #fff;
    border-radius: 20px;
    padding: 20px 10px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: transform 0.2s;
    border: 3px solid transparent;
  }
  .command-tile:hover { transform: scale(1.05); border-color: var(--highlight); }
  .command-tile .tile-emoji { font-size: 50px; display: block; }
  .command-tile .tile-word { font-size: 18px; font-weight: 700; color: var(--text); margin-top: 5px; }
</style>
</head>
<body>

<!-- Floating clouds -->
<div class="cloud">☁️</div>
<div class="cloud">☁️</div>

<!-- SCREEN 1: TITLE -->
<div class="screen active" id="screen-title">
  <div class="title-box">
    <span class="title-emoji">🐾</span>
    <div class="title-text">ANIMALS!</div>
    <div class="subtitle">Let's learn together 🌟</div>
    <button class="big-btn" onclick="startLesson()">▶ START</button>
  </div>
</div>

<!-- SCREEN 2: LEARN -->
<div class="screen" id="screen-learn">
  <div class="teacher-bar">
    <span>Teacher:</span>
    <button class="t-btn active-mode" onclick="setMode('learn')" id="btn-learn">📖 Learn</button>
    <button class="t-btn" onclick="setMode('quiz')" id="btn-quiz">❓ Quiz</button>
    <button class="t-btn" onclick="setMode('commands')" id="btn-commands">👋 Commands</button>
  </div>

  <div class="star-bar" id="star-bar"></div>
  <div class="progress-dots" id="progress-dots"></div>

  <div class="animal-card" id="learn-card">
    <span class="animal-emoji-big" id="learn-emoji" onclick="playSound()">🐶</span>
    <div class="animal-name" id="learn-name">DOG</div>
    <div class="sound-hint" id="learn-sound">🔊 "dog"</div>
    <div class="tap-me">👆 Tap the animal!</div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevAnimal()">⬅ Back</button>
      <button class="nav-btn next-btn" onclick="nextAnimal()">Next ➡</button>
    </div>
  </div>
</div>

<!-- SCREEN 3: QUIZ -->
<div class="screen" id="screen-quiz">
  <div class="teacher-bar">
    <span>Teacher:</span>
    <button class="t-btn" onclick="setMode('learn')" id="btn-learn2">📖 Learn</button>
    <button class="t-btn active-mode" onclick="setMode('quiz')" id="btn-quiz2">❓ Quiz</button>
    <button class="t-btn" onclick="setMode('commands')" id="btn-commands2">👋 Commands</button>
  </div>

  <div class="star-bar" id="star-bar2"></div>

  <div class="quiz-question" id="quiz-card">
    <div class="quiz-label">Find the...</div>
    <div class="quiz-word" id="quiz-word">DOG</div>
    <div class="choices-grid" id="choices-grid"></div>
  </div>
</div>

<!-- SCREEN 4: WIN -->
<div class="screen" id="screen-win">
  <div class="win-box">
    <span class="win-emoji">🎉</span>
    <div class="win-title">Amazing!</div>
    <div class="win-stars" id="win-stars">⭐⭐⭐⭐⭐</div>
    <div class="win-sub">You learned all the animals!</div>
    <button class="big-btn" style="margin-top:20px" onclick="restartQuiz()">Play Again 🔄</button>
  </div>
</div>

<!-- SCREEN 5: COMMANDS -->
<div class="screen" id="screen-commands">
  <div class="teacher-bar">
    <span>Teacher:</span>
    <button class="t-btn" onclick="setMode('learn')" id="btn-learn3">📖 Learn</button>
    <button class="t-btn" onclick="setMode('quiz')" id="btn-quiz3">❓ Quiz</button>
    <button class="t-btn active-mode" onclick="setMode('commands')" id="btn-commands3">👋 Commands</button>
  </div>
  <div class="command-grid" id="command-grid"></div>
</div>

<!-- Feedback emoji overlay -->
<div class="feedback" id="feedback" style="display:none"></div>

<script>
const animals = [
  { emoji: '🐶', name: 'DOG',      sound: 'Woof woof!' },
  { emoji: '🐱', name: 'CAT',      sound: 'Meow!' },
  { emoji: '🐘', name: 'ELEPHANT', sound: 'Paaah!' },
  { emoji: '🦁', name: 'LION',     sound: 'Roar!' },
  { emoji: '🐸', name: 'FROG',     sound: 'Ribbit!' },
  { emoji: '🐠', name: 'FISH',     sound: 'Blub blub!' },
];

const commands = [
  { emoji: '👋', word: 'HELLO',     sub: 'Wave hello!' },
  { emoji: '👍', word: 'GOOD',      sub: 'Thumbs up!' },
  { emoji: '🔁', word: 'AGAIN',     sub: 'Do it again!' },
  { emoji: '🤔', word: 'LISTEN',    sub: 'Listen carefully!' },
  { emoji: '👁️',  word: 'LOOK',      sub: 'Look at the screen!' },
  { emoji: '🌟', word: 'GREAT JOB', sub: 'You did it!' },
];

let currentAnimal = 0;
let mode = 'learn';
let stars = 0;
let quizAnswered = false;
let correctAnswer = '';

// --- INIT ---
function startLesson() {
  showScreen('learn');
  renderProgress();
  updateLearnCard();
  renderStars('star-bar');
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// --- MODE SWITCHING ---
function setMode(m) {
  mode = m;
  if (m === 'learn') {
    showScreen('learn');
    renderProgress();
    updateLearnCard();
    renderStars('star-bar');
  } else if (m === 'quiz') {
    showScreen('quiz');
    renderStars('star-bar2');
    newQuiz();
  } else if (m === 'commands') {
    showScreen('commands');
    renderCommands();
  }
}

// --- LEARN MODE ---
function updateLearnCard() {
  const a = animals[currentAnimal];
  document.getElementById('learn-emoji').textContent = a.emoji;
  document.getElementById('learn-name').innerHTML = a.name[0] + '<span>' + a.name.slice(1).toLowerCase() + '</span>';
  document.getElementById('learn-sound').textContent = '🔊 "' + a.name.toLowerCase() + '" — ' + a.sound;
  renderProgress();
}

function nextAnimal() {
  if (currentAnimal < animals.length - 1) {
    currentAnimal++;
    animateCard();
    updateLearnCard();
  } else {
    showFeedback('🌟');
  }
}

function prevAnimal() {
  if (currentAnimal > 0) {
    currentAnimal--;
    updateLearnCard();
  }
}

function animateCard() {
  const card = document.getElementById('learn-card');
  card.style.animation = 'none';
  setTimeout(() => { card.style.animation = 'slideIn 0.4s ease'; }, 10);
}

function playSound() {
  const a = animals[currentAnimal];
  showFeedback(a.emoji);
  // Highlight effect
  const el = document.getElementById('learn-emoji');
  el.style.transform = 'scale(1.3) rotate(-10deg)';
  setTimeout(() => { el.style.transform = ''; }, 300);
}

// --- PROGRESS DOTS ---
function renderProgress() {
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  animals.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < currentAnimal ? ' done' : '') + (i === currentAnimal ? ' current' : '');
    dots.appendChild(d);
  });
}

// --- STARS ---
function renderStars(id) {
  const bar = document.getElementById(id);
  if (!bar) return;
  bar.innerHTML = '';
  for (let i = 0; i < stars; i++) {
    const s = document.createElement('span');
    s.textContent = '⭐';
    bar.appendChild(s);
  }
}

function addStar() {
  stars++;
  renderStars('star-bar');
  renderStars('star-bar2');
}

// --- QUIZ MODE ---
function newQuiz() {
  quizAnswered = false;
  // Pick random correct answer
  const correctIdx = Math.floor(Math.random() * animals.length);
  const correct = animals[correctIdx];
  correctAnswer = correct.name;

  document.getElementById('quiz-word').textContent = correct.name;

  // Pick 3 wrong answers
  const pool = animals.filter((_, i) => i !== correctIdx);
  shuffle(pool);
  const choices = [correct, ...pool.slice(0, 3)];
  shuffle(choices);

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  choices.forEach(animal => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span>${animal.emoji}</span>`;
    btn.onclick = () => handleChoice(btn, animal.name);
    grid.appendChild(btn);
  });
}

function handleChoice(btn, name) {
  if (quizAnswered) return;
  quizAnswered = true;

  if (name === correctAnswer) {
    btn.classList.add('correct');
    showFeedback('⭐');
    addStar();
    setTimeout(newQuiz, 1200);
  } else {
    btn.classList.add('wrong');
    showFeedback('❌');
    // Highlight correct
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === animals.find(a => a.name === correctAnswer).emoji) {
        b.classList.add('correct');
      }
    });
    setTimeout(newQuiz, 1500);
  }
}

// --- COMMANDS ---
function renderCommands() {
  const grid = document.getElementById('command-grid');
  grid.innerHTML = '';
  commands.forEach(cmd => {
    const tile = document.createElement('div');
    tile.className = 'command-tile';
    tile.innerHTML = `<span class="tile-emoji">${cmd.emoji}</span><div class="tile-word">${cmd.word}</div>`;
    tile.onclick = () => {
      showFeedback(cmd.emoji);
      tile.style.borderColor = 'var(--highlight)';
      setTimeout(() => { tile.style.borderColor = 'transparent'; }, 800);
    };
    grid.appendChild(tile);
  });
}

// --- FEEDBACK ---
function showFeedback(emoji) {
  const el = document.getElementById('feedback');
  el.textContent = emoji;
  el.style.display = 'block';
  el.style.animation = 'none';
  setTimeout(() => {
    el.style.animation = 'feedbackPop 1s ease forwards';
  }, 10);
  setTimeout(() => { el.style.display = 'none'; }, 1000);
}

// --- UTILS ---
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function restartQuiz() {
  stars = 0;
  currentAnimal = 0;
  setMode('quiz');
}
</script>
</body>
</html>
