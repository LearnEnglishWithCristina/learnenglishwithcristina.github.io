<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Playground! 🛝</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg1: #E8F5E9;
    --bg2: #C8E6C9;
    --highlight: #2E7D32;
    --correct: #43A047;
    --wrong:   #E53935;
    --card:    #ffffff;
    --text:    #2c2c2c;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 10px 30px; overflow-x: hidden;
  }

  .floatie { position:fixed; font-size:32px; opacity:0.08; pointer-events:none; animation:floatUp linear infinite; }
  .floatie:nth-child(1){left:5%;  animation-duration:14s; animation-delay:0s;}
  .floatie:nth-child(2){left:25%; animation-duration:18s; animation-delay:-5s;}
  .floatie:nth-child(3){left:60%; animation-duration:12s; animation-delay:-8s;}
  .floatie:nth-child(4){left:82%; animation-duration:16s; animation-delay:-2s;}
  @keyframes floatUp{from{transform:translateY(0)}to{transform:translateY(-110vh)}}

  .screen { display:none; width:100%; max-width:720px; flex-direction:column; align-items:center; }
  .screen.active { display:flex; }

  /* ── TITLE ── */
  .title-box {
    background:var(--card); border-radius:32px; padding:40px 52px;
    text-align:center; box-shadow:0 10px 40px rgba(46,125,50,0.2);
    margin-top:55px; animation:bounceIn 0.6s ease;
  }
  @keyframes bounceIn{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
  .title-emoji { font-size:84px; display:block; margin-bottom:6px; }
  .title-text  { font-family:'Fredoka One',sans-serif; font-size:50px; color:var(--highlight); text-shadow:3px 3px 0 #C8E6C9; }
  .subtitle    { font-size:19px; color:#aaa; margin-top:8px; }

  .big-btn {
    margin-top:28px; background:var(--highlight); color:#fff;
    border:none; border-radius:50px; padding:18px 52px;
    font-size:28px; font-family:'Fredoka One',sans-serif;
    cursor:pointer; box-shadow:0 6px 0 #1B5E20; transition:all 0.15s;
    animation:wiggle 2.5s ease-in-out infinite;
  }
  .big-btn:hover  { transform:translateY(-3px); box-shadow:0 9px 0 #1B5E20; }
  .big-btn:active { transform:translateY(3px);  box-shadow:0 3px 0 #1B5E20; }
  @keyframes wiggle{0%,88%,100%{transform:rotate(0deg)}91%{transform:rotate(-3deg)}95%{transform:rotate(3deg)}}

  /* ── TEACHER BAR ── */
  .teacher-bar {
    background:rgba(0,0,0,0.72); color:#fff; border-radius:50px;
    padding:8px 20px; display:flex; gap:10px; align-items:center;
    margin-bottom:10px; font-size:13px; flex-wrap:wrap; justify-content:center;
  }
  .teacher-bar span { opacity:0.65; }
  .t-btn {
    background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.35);
    color:#fff; border-radius:20px; padding:4px 14px;
    font-family:'Nunito',sans-serif; font-size:13px; cursor:pointer;
  }
  .t-btn:hover       { background:rgba(255,255,255,0.32); }
  .t-btn.active-mode { background:var(--highlight); border-color:var(--highlight); }

  .star-bar { display:flex; gap:6px; font-size:26px; margin-bottom:6px; min-height:34px; }

  .progress-dots { display:flex; gap:9px; margin:4px 0 14px; flex-wrap:wrap; justify-content:center; }
  .dot { width:13px; height:13px; border-radius:50%; background:rgba(0,0,0,0.15); transition:background 0.3s; }
  .dot.done    { background:var(--correct); }
  .dot.current { background:var(--highlight); transform:scale(1.35); }

  /* ── LEARN CARD ── */
  .learn-card {
    background:var(--card); border-radius:30px; padding:28px 30px 24px;
    text-align:center; box-shadow:0 8px 30px rgba(0,0,0,0.12);
    width:100%; max-width:500px; animation:slideIn 0.38s ease;
  }
  @keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}

  .item-emoji-big {
    font-size:130px; display:block; cursor:pointer; line-height:1.2;
    filter:drop-shadow(0 5px 10px rgba(0,0,0,0.16)); transition:transform 0.2s;
  }
  .item-emoji-big:hover  { transform:scale(1.12) rotate(-6deg); }
  .item-emoji-big:active { transform:scale(0.93); }

  .item-name { font-family:'Fredoka One',sans-serif; font-size:50px; color:var(--highlight); margin:8px 0 4px; }
  .item-hint { font-size:17px; color:#bbb; font-style:italic; margin-bottom:14px; }
  .tap-me    { font-size:14px; color:#ccc; animation:blink 2s infinite; }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}

  .nav-row { display:flex; gap:14px; margin-top:14px; justify-content:center; }
  .nav-btn {
    background:#fff; border:3px solid #ddd; border-radius:50px;
    padding:11px 26px; font-size:20px; font-family:'Nunito',sans-serif; font-weight:700;
    cursor:pointer; transition:all 0.15s; color:var(--text);
  }
  .nav-btn:hover    { border-color:var(--highlight); color:var(--highlight); transform:scale(1.05); }
  .nav-btn.next-btn { background:var(--highlight); color:#fff; border-color:var(--highlight); }
  .nav-btn.next-btn:hover { color:#fff; }

  /* ── QUIZ ── */
  .quiz-card {
    background:var(--card); border-radius:30px; padding:24px;
    text-align:center; box-shadow:0 8px 30px rgba(0,0,0,0.12);
    width:100%; max-width:580px;
  }
  .quiz-label { font-size:20px; font-weight:700; color:#888; margin-bottom:4px; }
  .quiz-word  { font-family:'Fredoka One',sans-serif; font-size:44px; color:var(--highlight); margin-bottom:18px; }

  .choices-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  @media(max-width:480px){ .choices-grid{ grid-template-columns:repeat(2,1fr); } }

  .choice-btn {
    background:#fafafa; border:4px solid #e8e8e8; border-radius:20px;
    padding:14px 6px; font-size:52px; cursor:pointer; transition:all 0.2s;
    display:flex; flex-direction:column; align-items:center;
  }
  .choice-btn:hover   { transform:scale(1.1); border-color:var(--highlight); background:#E8F5E9; }
  .choice-btn.correct { background:#e8f5e9; border-color:var(--correct); animation:correctBounce 0.5s ease; }
  .choice-btn.wrong   { background:#ffebee; border-color:var(--wrong);   animation:shake 0.4s ease; }

  /* ── FIND IT GAME ── */
  .find-header {
    background:var(--card); border-radius:24px; padding:14px 22px;
    text-align:center; width:100%; max-width:680px; margin-bottom:12px;
    box-shadow:0 4px 14px rgba(0,0,0,0.08);
  }
  .find-question {
    font-family:'Fredoka One',sans-serif; font-size:26px; color:var(--highlight);
  }
  .find-question span { color:var(--wrong); }
  .find-hint { font-size:14px; color:#aaa; margin-top:4px; }

  /* Playground scene wrapper */
  .playground-wrap {
    width:100%; max-width:680px; position:relative;
    border-radius:20px; overflow:hidden;
    box-shadow:0 8px 28px rgba(0,0,0,0.16);
  }
  .playground-wrap svg { display:block; width:100%; height:auto; }

  /* Clickable hotspots overlaid on SVG */
  .hotspot {
    position:absolute; border-radius:50%;
    cursor:pointer; border:3px solid transparent;
    transition:all 0.2s;
    background:rgba(255,255,255,0);
  }
  .hotspot:hover { background:rgba(255,255,255,0.2); border-color:rgba(255,255,255,0.6); }
  .hotspot.correct-hs { background:rgba(67,160,71,0.35); border-color:var(--correct); animation:correctBounce 0.5s ease; }
  .hotspot.wrong-hs   { background:rgba(229,57,53,0.25); border-color:var(--wrong);   animation:shake 0.4s ease; }

  /* Label popups */
  .hs-label {
    position:absolute; background:var(--highlight); color:#fff;
    font-family:'Fredoka One',sans-serif; font-size:14px;
    border-radius:20px; padding:4px 12px; pointer-events:none;
    white-space:nowrap; display:none; z-index:10;
    box-shadow:0 3px 8px rgba(0,0,0,0.2);
  }
  .hs-label.show { display:block; }

  .find-progress {
    font-size:14px; color:#888; font-weight:700; text-align:center;
    margin-top:10px;
  }

  /* Result message */
  .find-result {
    font-family:'Fredoka One',sans-serif; font-size:22px;
    text-align:center; margin-top:10px; min-height:30px;
    animation:popIn 0.3s ease;
  }
  .find-result.correct-msg { color:var(--correct); }
  .find-result.wrong-msg   { color:var(--wrong); }
  @keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}

  /* ── WIN ── */
  .win-box {
    background:var(--card); border-radius:30px; padding:44px; text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,0.18); max-width:460px; animation:bounceIn 0.6s ease;
  }
  .win-emoji { font-size:80px; display:block; }
  .win-title { font-family:'Fredoka One',sans-serif; font-size:44px; color:var(--highlight); margin:12px 0; }
  .win-stars { font-size:38px; margin:8px 0; }
  .win-sub   { font-size:17px; color:#888; }

  /* ── FEEDBACK ── */
  .feedback {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:96px; pointer-events:none; z-index:999; display:none;
    animation:feedbackPop 1s ease forwards;
  }
  @keyframes feedbackPop{0%{transform:translate(-50%,-50%) scale(0);opacity:1}50%{transform:translate(-50%,-62%) scale(1.2);opacity:1}100%{transform:translate(-50%,-82%) scale(0.9);opacity:0}}
  @keyframes correctBounce{0%{transform:scale(1)}40%{transform:scale(1.22)}70%{transform:scale(0.96)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-8px)}80%{transform:translateX(5px)}}
</style>
</head>
<body>

<div class="floatie">🛝</div>
<div class="floatie">🌸</div>
<div class="floatie">⚽</div>
<div class="floatie">🌳</div>
<div class="feedback" id="feedback"></div>

<button id="sound-toggle" onclick="toggleSound()"
  style="position:fixed;top:14px;left:18px;z-index:999;background:rgba(255,255,255,0.85);
  border:2px solid #ccc;border-radius:50%;width:48px;height:48px;font-size:24px;
  cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,0.15);">🔊</button>

<!-- ══════════════ TITLE ══════════════ -->
<div class="screen active" id="screen-title">
  <div class="title-box">
    <span class="title-emoji">🛝</span>
    <div class="title-text">THE PLAYGROUND!</div>
    <div class="subtitle">Let's play outside! 🌤️</div>
    <button class="big-btn" onclick="startLesson()">▶ START</button>
  </div>
</div>

<!-- ══════════════ LEARN ══════════════ -->
<div class="screen" id="screen-learn">
  <div class="teacher-bar">
    <span>Teacher:</span>
    <button class="t-btn active-mode" id="tl-learn" onclick="setMode('learn')">📖 Learn</button>
    <button class="t-btn"             id="tl-quiz"  onclick="setMode('quiz')">❓ Quiz</button>
    <button class="t-btn"             id="tl-find"  onclick="setMode('find')">🔍 Find it!</button>
  </div>
  <div class="star-bar"      id="star-bar-learn"></div>
  <div class="progress-dots" id="progress-dots"></div>

  <div class="learn-card" id="learn-card">
    <span class="item-emoji-big" id="learn-emoji" onclick="bounce()">🛝</span>
    <div class="item-name" id="learn-name">SLIDE</div>
    <div class="item-hint" id="learn-hint">🔊 "slide"</div>
    <div class="tap-me">👆 Tap the picture!</div>
    <div class="nav-row">
      <button class="nav-btn"          onclick="prevItem()">⬅ Back</button>
      <button class="nav-btn next-btn" onclick="nextItem()">Next ➡</button>
    </div>
  </div>
</div>

<!-- ══════════════ QUIZ ══════════════ -->
<div class="screen" id="screen-quiz">
  <div class="teacher-bar">
    <span>Teacher:</span>
    <button class="t-btn"             id="tq-learn" onclick="setMode('learn')">📖 Learn</button>
    <button class="t-btn active-mode" id="tq-quiz"  onclick="setMode('quiz')">❓ Quiz</button>
    <button class="t-btn"             id="tq-find"  onclick="setMode('find')">🔍 Find it!</button>
  </div>
  <div class="star-bar" id="star-bar-quiz"></div>
  <div class="quiz-card">
    <div class="quiz-label">Find the...</div>
    <div class="quiz-word" id="quiz-word">SLIDE</div>
    <div class="choices-grid" id="choices-grid"></div>
  </div>
</div>

<!-- ══════════════ FIND IT ══════════════ -->
<div class="screen" id="screen-find">
  <div class="teacher-bar">
    <span>Teacher:</span>
    <button class="t-btn"             id="tf-learn" onclick="setMode('learn')">📖 Learn</button>
    <button class="t-btn"             id="tf-quiz"  onclick="setMode('quiz')">❓ Quiz</button>
    <button class="t-btn active-mode" id="tf-find"  onclick="setMode('find')">🔍 Find it!</button>
  </div>
  <div class="star-bar" id="star-bar-find"></div>

  <div class="find-header">
    <div class="find-question" id="find-question">Where is the <span id="find-target">SLIDE</span>?</div>
    <div class="find-hint">👆 Tap it in the picture!</div>
  </div>

  <!-- Playground scene -->
  <div class="playground-wrap" id="playground-wrap">
    <!-- SVG playground scene -->
    <svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" id="playground-svg">

      <!-- SKY -->
      <rect width="700" height="260" fill="#87CEEB"/>
      <!-- Clouds -->
      <ellipse cx="120" cy="50" rx="55" ry="30" fill="white" opacity="0.9"/>
      <ellipse cx="160" cy="40" rx="45" ry="28" fill="white" opacity="0.9"/>
      <ellipse cx="85"  cy="55" rx="35" ry="22" fill="white" opacity="0.9"/>
      <ellipse cx="520" cy="60" rx="60" ry="32" fill="white" opacity="0.9"/>
      <ellipse cx="565" cy="48" rx="50" ry="28" fill="white" opacity="0.9"/>
      <ellipse cx="480" cy="65" rx="38" ry="22" fill="white" opacity="0.9"/>
      <!-- SUN -->
      <circle cx="620" cy="55" r="38" fill="#FFD700"/>
      <line x1="620" y1="5"  x2="620" y2="20"  stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
      <line x1="620" y1="90" x2="620" y2="105" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
      <line x1="570" y1="55" x2="555" y2="55"  stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
      <line x1="670" y1="55" x2="685" y2="55"  stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
      <line x1="585" y1="20" x2="575" y2="10"  stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
      <line x1="655" y1="20" x2="665" y2="10"  stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
      <line x1="585" y1="90" x2="575" y2="100" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
      <line x1="655" y1="90" x2="665" y2="100" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>

      <!-- GROUND -->
      <rect y="260" width="700" height="160" fill="#7EC850"/>
      <!-- Grass texture lines -->
      <path d="M0 265 Q50 255 100 265 Q150 255 200 265 Q250 255 300 265 Q350 255 400 265 Q450 255 500 265 Q550 255 600 265 Q650 255 700 265" fill="none" stroke="#5aab3a" stroke-width="2"/>
      <!-- Path / ground area -->
      <ellipse cx="350" cy="360" rx="320" ry="50" fill="#D2B48C" opacity="0.3"/>

      <!-- ═══ TREE (left) ═══ id:tree -->
      <rect x="55" y="185" width="18" height="90" rx="6" fill="#795548"/>
      <!-- Branches -->
      <rect x="64" y="220" width="30" height="10" rx="5" fill="#795548" transform="rotate(-20 64 225)"/>
      <rect x="43" y="230" width="28" height="10" rx="5" fill="#795548" transform="rotate(20 57 235)"/>
      <!-- Leaves -->
      <circle cx="64"  cy="155" r="48" fill="#388E3C"/>
      <circle cx="40"  cy="175" r="36" fill="#43A047"/>
      <circle cx="88"  cy="175" r="36" fill="#43A047"/>
      <circle cx="64"  cy="200" r="28" fill="#66BB6A"/>

      <!-- ═══ SWING SET ═══ id:swing -->
      <!-- Frame -->
      <line x1="205" y1="100" x2="175" y2="260" stroke="#795548" stroke-width="8" stroke-linecap="round"/>
      <line x1="295" y1="100" x2="325" y2="260" stroke="#795548" stroke-width="8" stroke-linecap="round"/>
      <line x1="205" y1="100" x2="295" y2="100" stroke="#795548" stroke-width="8" stroke-linecap="round"/>
      <!-- Swing 1 ropes -->
      <line x1="225" y1="100" x2="222" y2="185" stroke="#9E9E9E" stroke-width="3"/>
      <line x1="255" y1="100" x2="258" y2="185" stroke="#9E9E9E" stroke-width="3"/>
      <!-- Swing 1 seat -->
      <rect x="215" y="183" width="50" height="10" rx="5" fill="#E53935"/>
      <!-- Swing 2 ropes -->
      <line x1="262" y1="100" x2="260" y2="170" stroke="#9E9E9E" stroke-width="3"/>
      <line x1="285" y1="100" x2="288" y2="170" stroke="#9E9E9E" stroke-width="3"/>
      <!-- Swing 2 seat -->
      <rect x="253" y="168" width="42" height="10" rx="5" fill="#1565C0"/>

      <!-- ═══ SLIDE ═══ id:slide -->
      <!-- Steps/ladder -->
      <rect x="390" y="115" width="16" height="150" rx="5" fill="#FF6F00"/>
      <rect x="406" y="115" width="16" height="150" rx="5" fill="#FF6F00"/>
      <!-- Step rungs -->
      <rect x="390" y="130" width="32" height="8" rx="3" fill="#FB8C00"/>
      <rect x="390" y="155" width="32" height="8" rx="3" fill="#FB8C00"/>
      <rect x="390" y="180" width="32" height="8" rx="3" fill="#FB8C00"/>
      <rect x="390" y="205" width="32" height="8" rx="3" fill="#FB8C00"/>
      <rect x="390" y="230" width="32" height="8" rx="3" fill="#FB8C00"/>
      <!-- Platform -->
      <rect x="382" y="108" width="48" height="16" rx="6" fill="#FF8F00"/>
      <!-- Slide ramp -->
      <path d="M398 120 L470 265 L510 265 L440 120 Z" fill="#FFD54F"/>
      <path d="M398 120 L440 120" stroke="#FF8F00" stroke-width="4"/>
      <path d="M470 265 L510 265" stroke="#FF8F00" stroke-width="4"/>
      <!-- Slide sides -->
      <line x1="398" y1="120" x2="470" y2="265" stroke="#FF6F00" stroke-width="5" stroke-linecap="round"/>
      <line x1="440" y1="120" x2="510" y2="265" stroke="#FF6F00" stroke-width="5" stroke-linecap="round"/>

      <!-- ═══ BENCH ═══ id:bench -->
      <!-- Legs -->
      <rect x="526" y="222" width="10" height="42" rx="3" fill="#795548"/>
      <rect x="566" y="222" width="10" height="42" rx="3" fill="#795548"/>
      <rect x="530" y="238" width="8"  height="30" rx="3" fill="#795548" transform="rotate(-10 534 253)"/>
      <rect x="562" y="238" width="8"  height="30" rx="3" fill="#795548" transform="rotate(10 566 253)"/>
      <!-- Seat -->
      <rect x="518" y="218" width="80" height="10" rx="5" fill="#A1887F"/>
      <!-- Backrest -->
      <rect x="518" y="198" width="80" height="8"  rx="4" fill="#A1887F"/>
      <rect x="524" y="198" width="8"  height="22" rx="3" fill="#795548"/>
      <rect x="588" y="198" width="8"  height="22" rx="3" fill="#795548"/>

      <!-- ═══ FLOWERS ═══ id:flowers -->
      <!-- Stem 1 -->
      <line x1="148" y1="310" x2="148" y2="275" stroke="#388E3C" stroke-width="4"/>
      <circle cx="148" cy="265" r="14" fill="#E91E63"/>
      <circle cx="134" cy="270" r="10" fill="#F06292"/>
      <circle cx="162" cy="270" r="10" fill="#F06292"/>
      <circle cx="148" cy="282" r="10" fill="#F06292"/>
      <circle cx="148" cy="265" r="7"  fill="#FFD700"/>
      <!-- Stem 2 -->
      <line x1="180" y1="310" x2="185" y2="278" stroke="#388E3C" stroke-width="4"/>
      <circle cx="185" cy="268" r="12" fill="#FF5722"/>
      <circle cx="173" cy="273" r="9"  fill="#FF7043"/>
      <circle cx="197" cy="273" r="9"  fill="#FF7043"/>
      <circle cx="185" cy="280" r="9"  fill="#FF7043"/>
      <circle cx="185" cy="268" r="6"  fill="#FFD700"/>
      <!-- Stem 3 -->
      <line x1="163" y1="315" x2="165" y2="288" stroke="#388E3C" stroke-width="4"/>
      <circle cx="165" cy="278" r="11" fill="#9C27B0"/>
      <circle cx="154" cy="282" r="8"  fill="#CE93D8"/>
      <circle cx="176" cy="282" r="8"  fill="#CE93D8"/>
      <circle cx="165" cy="289" r="8"  fill="#CE93D8"/>
      <circle cx="165" cy="278" r="5"  fill="#FFD700"/>

      <!-- ═══ BALL ═══ id:ball -->
      <circle cx="310" cy="345" r="30" fill="#E53935"/>
      <path d="M285 330 Q310 310 335 330" fill="none" stroke="white" stroke-width="3"/>
      <path d="M285 360 Q310 380 335 360" fill="none" stroke="white" stroke-width="3"/>
      <line x1="310" y1="315" x2="310" y2="375" stroke="white" stroke-width="3"/>

      <!-- ═══ SANDBOX ═══ id:sandbox -->

      <!-- ═══ CLIMBING FRAME ═══ id:climbing -->

      <rect x="30"  y="165" width="10" height="100" rx="4" fill="#9C27B0"/>

      <!-- but we'll put climbing frame on right side instead - more space -->
      <!-- Vertical poles right side -->
      <rect x="600" y="155" width="10" height="110" rx="4" fill="#9C27B0"/>

      <rect x="598" y="155" width="89" height="10" rx="4" fill="#CE93D8"/>

    <!-- Hotspot overlays — positioned as % of SVG size -->

    <div class="hotspot" id="hs-FLOWERS"  style="left:17%; top:58%; width:12%; height:24%;"></div>

    <div class="hotspot" id="hs-BALL"     style="left:40%; top:72%; width:10%; height:18%;"></div>

    <!-- Labels -->
    <div class="hs-label" id="lbl-SLIDE"          style="left:50%; top:22%;">🛝 SLIDE</div>
    <div class="hs-label" id="lbl-SWING"          style="left:22%; top:18%;">🪢 SWING</div>
    <div class="hs-label" id="lbl-TREE"           style="left:2%;  top:25%;">🌳 TREE</div>
    <div class="hs-label" id="lbl-BENCH"          style="left:70%; top:44%;">🪑 BENCH</div>
    <div class="hs-label" id="lbl-FLOWERS"        style="left:15%; top:54%;">🌸 FLOWERS</div>
    <div class="hs-label" id="lbl-BALL"           style="left:38%; top:68%;">⚽ BALL</div>
    <div class="hs-label" id="lbl-SANDBOX"        style="left:74%; top:64%;">🏖️ SANDBOX</div>
    <div class="hs-label" id="lbl-CLIMBING FRAME" style="left:83%; top:30%;">🧗 CLIMBING FRAME</div>
  </div>

  <div class="find-result" id="find-result"></div>
  <div class="find-progress" id="find-progress">1 / 8</div>
</div>

<!-- ══════════════ WIN ══════════════ -->
<div class="screen" id="screen-win">
  <div class="win-box">
    <span class="win-emoji">🎉</span>
    <div class="win-title">Amazing!</div>
    <div class="win-stars" id="win-stars">⭐⭐⭐</div>
    <div class="win-sub">You know the playground! 🛝</div>
    <button class="big-btn" style="animation:none" onclick="restartQuiz()">Play Again 🔄</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════
const items = [
  { emoji:'🛝', name:'SLIDE',          sound:'slide' },
  { emoji:'🪢', name:'SWING',          sound:'swing' },
  { emoji:'🌳', name:'TREE',           sound:'tree' },
  { emoji:'🪑', name:'BENCH',          sound:'bench' },
  { emoji:'🌸', name:'FLOWERS',        sound:'flowers' },
  { emoji:'⚽', name:'BALL',           sound:'ball' },
  { emoji:'🏖️', name:'SANDBOX',        sound:'sandbox' },
  { emoji:'🧗', name:'CLIMBING FRAME', sound:'climbing frame' },
];

// ═══════════════════════════════════════════════════
// TTS
// ═══════════════════════════════════════════════════
let ttsReady=false, soundOn=true, ttsVoice=null;
function unlockTTS(){
  if(ttsReady)return; ttsReady=true;
  const u=new SpeechSynthesisUtterance(' '); u.volume=0;
  window.speechSynthesis.speak(u); pickVoice();
}
function pickVoice(){
  const v=window.speechSynthesis.getVoices();
  ttsVoice=v.find(x=>x.lang==='en-US'&&x.localService)||
           v.find(x=>x.lang==='en-US')||
           v.find(x=>x.lang.startsWith('en-'))||
           v.find(x=>x.lang.startsWith('en'))||v[0]||null;
}
if(window.speechSynthesis){ window.speechSynthesis.onvoiceschanged=pickVoice; pickVoice(); }
function speak(text,rate=0.6){
  if(!soundOn||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=rate; u.pitch=1.05; u.volume=1;
  if(ttsVoice)u.voice=ttsVoice;
  window.speechSynthesis.speak(u);
}
function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('sound-toggle').textContent=soundOn?'🔊':'🔇';
}
document.addEventListener('touchstart',unlockTTS,{once:true});
document.addEventListener('mousedown', unlockTTS,{once:true});

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let current=0, stars=0, quizAnswered=false;
let findQueue=[], findIdx=0, findAnswered=false;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
function startLesson(){ showScreen('learn'); renderProgress(); updateLearnCard(); renderStars(); }

function setMode(m){
  ['learn','quiz','find'].forEach(mode=>{
    ['tl','tq','tf'].forEach(prefix=>{
      const el=document.getElementById(prefix+'-'+mode);
      if(el) el.className='t-btn'+(mode===m?' active-mode':'');
    });
  });
  if(m==='learn') { showScreen('learn'); renderProgress(); updateLearnCard(); renderStars(); }
  if(m==='quiz')  { showScreen('quiz');  renderStars(); newQuiz(); }
  if(m==='find')  { showScreen('find');  renderStars(); initFind(); }
}

// ═══════════════════════════════════════════════════
// LEARN
// ═══════════════════════════════════════════════════
function updateLearnCard(){
  const it=items[current];
  document.getElementById('learn-emoji').textContent=it.emoji;
  document.getElementById('learn-name').textContent=it.name;
  document.getElementById('learn-hint').textContent='🔊 "'+it.sound+'"';
  renderProgress();
  speak(it.name, 0.6);
}
function nextItem(){
  if(current<items.length-1){ current++; animateCard(); updateLearnCard(); }
  else showFeedback('🌟');
}
function prevItem(){ if(current>0){ current--; updateLearnCard(); } }
function animateCard(){
  const c=document.getElementById('learn-card');
  c.style.animation='none';
  setTimeout(()=>{ c.style.animation='slideIn 0.38s ease'; },10);
}
function bounce(){
  const el=document.getElementById('learn-emoji');
  el.style.transform='scale(1.3) rotate(-8deg)';
  setTimeout(()=>{ el.style.transform=''; },280);
  speak(items[current].name, 0.6);
  showFeedback(items[current].emoji);
}
function renderProgress(){
  const dots=document.getElementById('progress-dots');
  dots.innerHTML='';
  items.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i<current?' done':'')+(i===current?' current':'');
    dots.appendChild(d);
  });
}

// ═══════════════════════════════════════════════════
// STARS
// ═══════════════════════════════════════════════════
function addStar(){ stars++; renderStars(); }
function renderStars(){
  ['star-bar-learn','star-bar-quiz','star-bar-find'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return; el.innerHTML='';
    for(let i=0;i<stars;i++){ const s=document.createElement('span'); s.textContent='⭐'; el.appendChild(s); }
  });
}

// ═══════════════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════════════
function newQuiz(){
  quizAnswered=false;
  const correctIdx=Math.floor(Math.random()*items.length);
  const correct=items[correctIdx];
  document.getElementById('quiz-word').textContent=correct.name;
  speak(correct.name, 0.6);

  const others=[...items.filter((_,i)=>i!==correctIdx)];
  const choices=[correct,...shuffle(others)];
  for(let i=choices.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [choices[i],choices[j]]=[choices[j],choices[i]];
  }

  const grid=document.getElementById('choices-grid');
  grid.innerHTML='';
  choices.forEach(it=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.dataset.name=it.name;
    btn.innerHTML=`<span>${it.emoji}</span>`;
    btn.onclick=()=>handleQuiz(btn,it.name,correct.name);
    grid.appendChild(btn);
  });
}
function handleQuiz(btn,chosen,correct){
  if(quizAnswered)return; quizAnswered=true;
  if(chosen===correct){
    btn.classList.add('correct'); showFeedback('⭐'); addStar();
    speak(correct+'! Great job!', 0.6);
    setTimeout(newQuiz,1400);
  } else {
    btn.classList.add('wrong'); showFeedback('❌'); speak('Try again!', 0.6);
    document.querySelectorAll('.choice-btn').forEach(b=>{ if(b.dataset.name===correct) b.classList.add('correct'); });
    setTimeout(newQuiz,1700);
  }
}

// ═══════════════════════════════════════════════════
// FIND IT GAME
// ═══════════════════════════════════════════════════
function initFind(){
  findQueue=shuffle([...items]);
  findIdx=0; findAnswered=false;
  setupHotspots();
  renderFindRound();
}

function setupHotspots(){
  items.forEach(it=>{
    const hs=document.getElementById('hs-'+it.name);
    if(!hs)return;
    hs.classList.remove('correct-hs','wrong-hs');
    hs.onclick=()=>handleFindClick(it.name);
  });
}

function renderFindRound(){
  findAnswered=false;
  const target=findQueue[findIdx];
  document.getElementById('find-target').textContent=target.name;
  document.getElementById('find-result').textContent='';
  document.getElementById('find-result').className='find-result';
  document.getElementById('find-progress').textContent=(findIdx+1)+' / '+findQueue.length;

  // Hide all labels
  items.forEach(it=>{
    const lbl=document.getElementById('lbl-'+it.name);
    if(lbl) lbl.classList.remove('show');
    const hs=document.getElementById('hs-'+it.name);
    if(hs){ hs.classList.remove('correct-hs','wrong-hs'); hs.style.pointerEvents='auto'; }
  });

  speak('Where is the '+target.sound+'? Tap it!', 0.58);
}

function handleFindClick(name){
  if(findAnswered)return;
  const target=findQueue[findIdx];
  const hs=document.getElementById('hs-'+name);
  const lbl=document.getElementById('lbl-'+name);
  const result=document.getElementById('find-result');

  if(name===target.name){
    findAnswered=true;
    hs.classList.add('correct-hs');
    if(lbl) lbl.classList.add('show');
    result.textContent='✅ Yes! That\'s the '+target.sound+'!';
    result.className='find-result correct-msg';
    showFeedback('⭐'); addStar();
    speak('Yes! That is the '+target.sound+'! Well done!', 0.6);
    // Disable all hotspots
    items.forEach(it=>{
      const h=document.getElementById('hs-'+it.name);
      if(h) h.style.pointerEvents='none';
    });
    setTimeout(()=>{
      findIdx++;
      if(findIdx>=findQueue.length){
        showFeedback('🎉'); speak('Amazing! You found everything!', 0.6);
        setTimeout(()=>{ showScreen('win'); document.getElementById('win-stars').textContent='⭐'.repeat(Math.min(5,stars)); },1000);
      } else {
        renderFindRound();
      }
    },1600);
  } else {
    hs.classList.add('wrong-hs');
    if(lbl) lbl.classList.add('show');
    result.textContent='❌ That\'s the '+name.toLowerCase()+'! Try again!';
    result.className='find-result wrong-msg';
    showFeedback('❌');
    speak('That is the '+name.toLowerCase()+'! Try again!', 0.6);
    setTimeout(()=>{
      hs.classList.remove('wrong-hs');
      if(lbl) lbl.classList.remove('show');
      result.textContent='';
      result.className='find-result';
    },1800);
  }
}

function restartQuiz(){ stars=0; current=0; setMode('quiz'); }

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function showFeedback(emoji){
  const el=document.getElementById('feedback');
  el.textContent=emoji; el.style.display='block'; el.style.animation='none';
  setTimeout(()=>{ el.style.animation='feedbackPop 1s ease forwards'; },10);
  setTimeout(()=>{ el.style.display='none'; },1050);
}
</script>
</body>
